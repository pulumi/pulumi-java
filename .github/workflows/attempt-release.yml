name: Weekly release

on:
  schedule:
    # Mondays at 09:00 UTC.
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

permissions:
  # For ESC OIDC auth.
  id-token: write
  contents: read

env:
  ESC_ACTION_OIDC_AUTH: true
  ESC_ACTION_OIDC_ORGANIZATION: pulumi
  ESC_ACTION_OIDC_REQUESTED_TOKEN_TYPE: urn:pulumi:token-type:access_token:organization
  ESC_ACTION_ENVIRONMENT: github-secrets/pulumi-pulumi-java
  ESC_ACTION_EXPORT_ENVIRONMENT_VARIABLES: PULUMI_BOT_TOKEN

jobs:
  attempt-release:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch secrets from ESC
        uses: pulumi/esc-action@197ccaa42ab49560ce838a3010eb8345ce086896 # v1

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ env.PULUMI_BOT_TOKEN }}

      - name: Setup mise and install tools
        uses: jdx/mise-action@v3.4.0

      - name: Check for unreleased changes
        id: check
        run: |
          # `changie batch auto --dry-run` exits non-zero when there are no fragments;
          # `|| true` keeps the step alive so we can inspect the message.
          output=$(changie batch auto --dry-run 2>&1 || true)
          if [[ "$output" == *"no unreleased changes"* ]]; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Batch unreleased changes
        if: steps.check.outputs.has-changes == 'true'
        run: changie batch auto

      - name: Merge into CHANGELOG.md
        if: steps.check.outputs.has-changes == 'true'
        run: changie merge

      - name: Get the new version
        if: steps.check.outputs.has-changes == 'true'
        id: latest
        run: echo "output=$(changie latest)" >> "$GITHUB_OUTPUT"

      - name: Open release PR
        if: steps.check.outputs.has-changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ env.PULUMI_BOT_TOKEN }}
          VERSION: ${{ steps.latest.outputs.output }}
        run: |
          set -euo pipefail
          BRANCH="automation/release-${VERSION}"

          git config user.name "pulumi-bot"
          git config user.email "bot@pulumi.com"
          git checkout -b "$BRANCH"
          git add .changes CHANGELOG.md
          git commit -m "Changelog for ${VERSION}"
          git push --force --set-upstream origin "$BRANCH"

          # If a PR is already open for this branch, the force-push above refreshed it; reuse its URL.
          existing=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url')
          if [ -n "$existing" ]; then
            echo "PR already open: ${existing}; refreshed the branch."
            echo "url=${existing}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_url=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Changelog for ${VERSION}" \
            --body "Automated release PR generated by \`.github/workflows/attempt-release.yml\`. See [CONTRIBUTING.md](./CONTRIBUTING.md) for the release process.")
          echo "url=${pr_url}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack (release ready)
        if: steps.pr.outputs.url != ''
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ secrets.RELEASE_BOT_TOKEN }}
          payload: |
            channel: "#team-iac-core"
            text: "`pulumi-java` ${{ steps.latest.outputs.output }} release is ready to go! ${{ steps.pr.outputs.url }}"

      - name: Notify Slack (no changes)
        if: steps.check.outputs.has-changes == 'false'
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ secrets.RELEASE_BOT_TOKEN }}
          payload: |
            channel: "#team-iac-core"
            text: "No `pulumi-java` release this week — no unreleased changes."
